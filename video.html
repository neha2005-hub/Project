<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Player</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 400px;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, .5);
        }

        h2 {
            color: black;
            text-align: center;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background-color: wheat;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            color: white;
        }

        #playBtn {
            background: #ff0000;
        }

        #shareBtn {
            background: #28a745;
        }

        button:hover {
            opacity: .9;
        }

        .player {
            width: 100%;
            height: 350px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>YouTube Video Player</h2>

        <div class="controls">
            <input id="videoInput" type="text" placeholder="Paste YouTube URL">
            <button id="playBtn" onclick="change()">Play</button>
            <button id="shareBtn" onclick="share()">Share</button>
        </div>

        <div class="player">
            <iframe id="frame" src="https://www.youtube.com/embed/oafxkMv4xnc?si=tFeel3n1nn3_MPxB" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const queryString = window.location.search;
        const currentURL = window.location.href;
        const urlParams = new URLSearchParams(queryString);

        let frame = document.getElementById("frame");
        let videoInput = document.getElementById("videoInput");

        let videoId = urlParams.get("v");

        if (videoId.length >= 10) {
            frame.src = "https://www.youtube.com/embed/" + videoId;
        }

        function change() {

            let link = videoInput.value;

            if (link.length != 48) {
                alert("Invalid Video Link");
                videoInput.value = "";
                return;
            }

            videoId = link.slice(17,28);
            frame.src = "https://www.youtube.com/embed/" + videoId;
            videoInput.value = "";

            const url = new URL(currentURL);
            url.searchParams.delete('v');
            url.searchParams.set("v", videoId);
            window.history.replaceState(null, '', url);
        }

        function share() {

            if (videoId == "") {
                alert("No Video to share - Please input some link");
                return;
            }

            let shareLink = currentURL + "?v=" + videoId;

            window.location = 'https://wa.me/?text=Play Ad-Free Video: ' + encodeURI(currentURL);
        }
    </script>
</body>

</html>
