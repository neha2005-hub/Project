<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        * { 
            margin: 0px; 
            padding: 0px; 
            box-sizing: border-box; 
        }
        body {
            background-color: #032d58;
            height: 100vh;
            width: 100vw;
            display: grid;
            place-content: center;
        }
        div { 
            background-color: #fff; 
            padding: 20px; 
            border-radius: 5px; 
        }
        form { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        form * { 
            padding: 10px; 
            border-radius: 5px; 
            max-width: 300px;
        }
        input, select {
            border: 2px solid rgb(87, 85, 85);
        }
        button { 
            background-color: #73b327; 
            font-size: 15px; 
            cursor: pointer; 
            border: none; 
        }
        #msg { 
            text-align: center; 
            font-weight: bold; 
            display: none; 
        }
        #msg.success { 
            color: green; 
        }
        #msg.error { 
            color: red; 
        }
    </style>
</head>
<body>
    <div>
        <form id="regForm">
            <h1>Registration Form</h1>
            <input type="text"   name="fullname" id="fullname" placeholder="Full Name" required>
            <input type="email"  name="email"    id="email"    placeholder="Email" required>
            <input type="tel" name="mobile"   id="mobile"   placeholder="Mobile Number" required>
            <select name="college" id="college" required>
                <option value="">Select College</option>
                <option value="L.S. College, Muzaffarpur">L.S. College, Muzaffarpur</option>
                <option value="R.N. College, Hajipur">R.N. College, Hajipur</option>
                <option value="L.N.T. College, Muzaffarpur">L.N.T. College, Muzaffarpur</option>
                <option value="L.N. College, Bhagwanpur">L.N. College, Bhagwanpur</option>
                <option value="L.N.D. College, Motihari">L.N.D. College, Motihari</option>
                <option value="M.D.D.M. College, Muzaffarpur">M.D.D.M. College, Muzaffarpur</option>
                <option value="M.J.K. College, Bettiah">M.J.K. College, Bettiah</option> 
                <option value="R.D.S. College, Muzaffarpur">R.D.S. College, Muzaffarpur</option>
                <option value="R.L.S.Y. College, Bettiah">R.L.S.Y. College, Bettiah</option>
                <option value="Other">Other</option>
            </select>
            <select name="course" id="course" required>
                <option value="">Select Course</option>
                <option value="BCA">BCA</option>
                <option value="BBA">BBA</option>
                <option value="BBA">BMC</option>
                <option value="BBA">MCA</option>
                <option value="BBA">MBA</option>
            </select>
            <select name="semester" id="semester" required>
                <option value="">Select Semester</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
                <option value="3">3rd Semester</option>
                <option value="4">4th Semester</option>
                <option value="5">5th Semester</option>
                <option value="6">6th Semester</option>
            </select>
            <button type="submit" id="submitBtn">Submit</button>
            <p id="msg"></p>
        </form>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrivckbkCQhjDGhlK9QIDc5otdB8ngoqv9c-GnSKYaWu9EAewOD3G_Ei_JWSzp9xFM/exec";

        document.getElementById("regForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const btn = document.getElementById("submitBtn");
            const msg = document.getElementById("msg");
            btn.disabled = true;
            btn.textContent = "Submitting...";
            msg.style.display = "none";

            const payload = {
                fullname: document.getElementById("fullname").value,
                email:    document.getElementById("email").value,
                mobile:   document.getElementById("mobile").value,
                college:  document.getElementById("college").value,
                course:   document.getElementById("course").value,
                semester: document.getElementById("semester").value,
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",        
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                msg.textContent = "✅ Registered successfully!";
                msg.className = "success";
                msg.style.display = "block";
                document.getElementById("regForm").reset();
            })
            .catch(() => {
                msg.textContent = "❌ Submission failed. Try again.";
                msg.className = "error";
                msg.style.display = "block";
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = "Submit";
            });
        });
    </script>
</body>
</html>
