<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Link Manager</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', sans-serif;
            }

            body {
                background: #f1f5f9;
                padding: 40px;
            }

            .container {
                max-width: 1000px;
                margin: auto;
            }

            .header {
                display: flex;
                justify-content: flex-end;
                margin-bottom: 20px;
            }

            .add-btn {
                padding: 12px 24px;
                border: none;
                border-radius: 10px;
                background: #2563eb;
                color: #fff;
                font-size: 16px;
                cursor: pointer;
                transition: .3s;
            }

            .add-btn:hover {
                background: #1d4ed8;
            }

            .main-div {
                background: #fff;
                min-height: 300px;
                padding: 20px;
                border-radius: 15px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, .08);
            }

            .main-div h2 {
                margin-bottom: 20px;
                color: #1e293b;
            }

            #linksContainer {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }

            .link-item {
                position: relative;
                aspect-ratio: 1/1;
                background: #fff;
                border: 2px solid #e2e8f0;
                border-radius: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 20px;
                box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
                transition: .3s;
            }

            .link-item:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 20px rgba(0, 0, 0, .12);
            }

            .link-item a {
                text-decoration: none;
                color: #2563eb;
                font-size: 20px;
                font-weight: 600;
                word-break: break-word;
            }

            .delete-btn {
                position: absolute;
                top: 10px;
                right: 10px;
                width: 32px;
                height: 32px;
                border: none;
                border-radius: 50%;
                color: #fff;
                font-size: 16px;
                cursor: pointer;
                transition: .3s;
            }

            .delete-btn:hover {
                background: #dc2626;
                transform: scale(1.1);
            }

            .popup {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .5);
                display: none;
                justify-content: center;
                align-items: center;
            }

            .popup-content {
                width: 400px;
                background: #fff;
                padding: 25px;
                border-radius: 15px;
                animation: popupShow .2s ease;
            }

            @keyframes popupShow {
                from {
                    opacity: 0;
                    transform: scale(.9);
                }

                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            .popup-content h3 {
                margin-bottom: 15px;
                color: #1e293b;
            }

            .popup-content input {
                width: 100%;
                padding: 12px;
                margin-bottom: 12px;
                border: 1px solid #cbd5e1;
                border-radius: 10px;
                outline: none;
            }

            .popup-content input:focus {
                border-color: #2563eb;
            }

            .actions {
                display: flex;
                justify-content: flex-end;
                gap: 10px;
            }

            .cancel-btn, .submit-btn {
                border: none;
                padding: 10px 18px;
                border-radius: 8px;
                cursor: pointer;
            }

            .cancel-btn {
                background: #e2e8f0;
            }

            .submit-btn {
                background: #22c55e;
                color: #fff;
            }

            .submit-btn:hover {
                background: #16a34a;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <button class="add-btn" id="openPopup">Add Link</button>
            </div>
            <div class="main-div">
                <h2>Saved Links</h2>

                <div id="linksContainer"></div>
            </div>
        </div>
        <div class="popup" id="popup">
            <div class="popup-content">
                <h3>Add New Link</h3>

                <input type="text" id="title" placeholder="Enter Title">
                <input type="url" id="url" placeholder="https://example.com">

                <div class="actions">
                    <button class="cancel-btn" id="cancelBtn">Cancel</button>
                    <button class="submit-btn" id="addLink">Add</button>
                </div>
            </div>
        </div>

        <script>
            const popup = document.getElementById("popup");
            const openPopup = document.getElementById("openPopup");
            const cancelBtn = document.getElementById("cancelBtn");
            const addLinkBtn = document.getElementById("addLink");
            const linksContainer = document.getElementById("linksContainer");

            openPopup.addEventListener("click", () => {
                popup.style.display = "flex";
            });

            cancelBtn.addEventListener("click", () => {
                popup.style.display = "none";
            });

            popup.addEventListener("click", (e) => {
                if (e.target === popup) {
                    popup.style.display = "none";
                }
            });

            addLinkBtn.addEventListener("click", () => {

                const title = document.getElementById("title").value.trim();
                const url = document.getElementById("url").value.trim();

                if (title === "" || url === "") {
                    alert("Please fill all fields");
                    return;
                }

                const card = document.createElement("div");
                card.classList.add("link-item");

                card.innerHTML = `<button class="delete-btn">X</button>
                <a href="${url}" target="_blank">${title}</a>`;

                card.querySelector(".delete-btn")
                    .addEventListener("click", (e) => {
                        e.stopPropagation();
                        card.remove();
                    });

                linksContainer.appendChild(card);

                document.getElementById("title").value = "";
                document.getElementById("url").value = "";

                popup.style.display = "none";
            });
        </script>
    </body>
</html>
