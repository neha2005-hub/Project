<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Harshit Sir</title>
        <style>
            * {
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }
            body {
                background: gray;
                width: 100vw;
                height: 100vh;
                display: grid;
                place-content: center;
            }
            div {
                background-color: #3e8626;
                border-radius: 10px;
                width: 300px;
                text-align: center;
            }
            img {
                width: 300px;
                border-radius: 10px 10px 0px 0px;
            }
            a {
                background-color: #072a63;
                color: white;
                display: block;
                margin: 10px;
                padding: 10px;
                border-radius: 10px;
                font-size: 30px;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div>
            <img src="harshit.jpeg" alt="Harshit"> 
            <a href="https://www.instagram.com/harshit.csv/">@harshit.csv</a>     
        </div>
    </body>
</html>
