<html>
  <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Traffic Signal</title>

      <style>
          *{
              margin:0;
              padding:0;
              box-sizing:border-box;
              font-family: Arial, sans-serif;
          }

          body{
              width:100vw;
              height:100vh;
              display:flex;
              justify-content:center;
              align-items:center;
              background:#f3f3f3;
          }

          .container{
              display:flex;
              gap:40px;
              background:white;
              padding:30px;
              border-radius:25px;
              box-shadow:0 5px 15px rgba(0,0,0,0.2);
              align-items:center;
          }

          .traffic-box{
              width:170px;
              background:#222;
              padding:20px;
              border-radius:20px;
              display:flex;
              flex-direction:column;
              align-items:center;
              gap:20px;
              position:relative;
          }

          .light{
              width:90px;
              height:90px;
              border-radius:50%;
              background:#555;
              box-shadow:
                  inset 0 0 10px rgba(0,0,0,0.7),
                  0 0 10px rgba(0,0,0,0.4);
          }

          .red.active{
              background:red;
              box-shadow:0 0 30px red;
          }

          .yellow.active{
              background:yellow;
              box-shadow:0 0 30px yellow;
          }

          .green.active{
              background:green;
              box-shadow:0 0 30px green;
          }

          .pole{
              width:20px;
              height:120px;
              background:#222;
              margin:auto;
          }

          .base{
              width:80px;
              height:20px;
              background:#222;
              border-radius:10px;
              margin:auto;
          }

          .control-panel{
              display:flex;
              flex-direction:column;
              gap:25px;
          }

          .status-box{
              background:#f7f7f7;
              padding:25px;
              border-radius:15px;
              text-align:center;
              width:220px;
              border:2px solid #ddd;
          }

          .status-box h2{
              margin-bottom:15px;
              color:#222;
          }

          #signalText{
              font-size:35px;
              font-weight:bold;
          }

          #message{
              margin-top:10px;
              font-size:22px;
              color:#444;
          }

          .buttons{
              display:flex;
              flex-direction:column;
              gap:15px;
          }

          button{
              padding:14px;
              border:none;
              border-radius:12px;
              font-size:18px;
              color:white;
              cursor:pointer;
              font-weight:bold;
          }

          .next-btn{
              background: red;
          }

          .auto-btn{
              background: yellow;
              color:black;
          }

          .reset-btn{
              background: green;
          }

          button:hover{
              opacity:0.9;
          }

      </style>
  </head>
  <body>
      <div class="container">
          <div>
              <div class="traffic-box">
                  <div class="light red active" id="red"></div>
                  <div class="light yellow" id="yellow"></div>
                  <div class="light green" id="green"></div>
              </div>

              <div class="pole"></div>
              <div class="base"></div>
          </div>

          <div class="control-panel">
              <div class="status-box">
                  <h2>CURRENT SIGNAL</h2>

                  <div id="signalText" style="color:red;">RED</div>
                  <div id="message">STOP</div>
              </div>

              <div class="buttons">
                  <button class="next-btn" onclick="nextSignal()">NEXT</button>
                  <button class="auto-btn" onclick="autoPlay()">AUTO PLAY</button>
                  <button class="reset-btn" onclick="resetSignal()">RESET</button>
              </div>
          </div>
      </div>

      <script>

          let signals = [
              {
                  color:"red",
                  text:"RED",
                  message:"STOP"
              },

              {
                  color:"yellow",
                  text:"YELLOW",
                  message:"READY"
              },

              {
                  color:"green",
                  text:"GREEN",
                  message:"GO"
              }
          ];

          let index = 0;
          let auto = null;

          let signalText = document.getElementById("signalText");
          let message = document.getElementById("message");

          function updateSignal(){

              document.getElementById("red").classList.remove("active");
              document.getElementById("yellow").classList.remove("active");
              document.getElementById("green").classList.remove("active");

              let current = signals[index];

              document.getElementById(current.color).classList.add("active");

              signalText.innerHTML = current.text;
              signalText.style.color = current.color;

              message.innerHTML = current.message;
          }

          function nextSignal(){

              index++;

              if(index > 2){
                  index = 0;
              }

              updateSignal();
          }

          function autoPlay(){

              if(auto == null){

                  auto = setInterval(() => {
                      nextSignal();
                  }, 1500);

              }else{

                  clearInterval(auto);
                  auto = null;
              }
          }

          function resetSignal(){

              clearInterval(auto);
              auto = null;

              index = 0;

              updateSignal();
          }

      </script>
  </body>
</html>
