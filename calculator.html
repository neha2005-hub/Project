<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Calculator</title>

        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:Arial, sans-serif;
            }

            body{
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                background:#1e1e1e;
            }

            .calculator{
                width:320px;
                background:#2c2c2c;
                padding:20px;
                border-radius:15px;
                box-shadow:0 0 20px rgba(0,0,0,0.4);
            }

            .display{
                width:100%;
                height:70px;
                border:none;
                outline:none;
                background:#111;
                color:#fff;
                text-align:right;
                font-size:2rem;
                padding:15px;
                border-radius:10px;
                margin-bottom:15px;
            }

            .buttons{
                display:grid;
                grid-template-columns:repeat(4,1fr);
                gap:10px;
            }

            button{
                height:60px;
                border:none;
                border-radius:10px;
                font-size:1.3rem;
                cursor:pointer;
                transition:0.2s;
            }

            button:hover{
                transform:scale(1.05);
            }

            .number{
                background:#444;
                color:white;
            }

            .operator{
                background:orange;
                color:white;
            }

            .equal{
                background:#00b894;
                color:white;
                grid-column:span 2;
            }

            .clear{
                background:#d63031;
                color:white;
            }
        </style>
    </head>

    <body>
        <div class="calculator">
            <input type="text" class="display" id="display" placeholder="0" readonly>

            <div class="buttons">
            <button class="clear" onclick="appendValue('c')">C</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            <button class="operator" onclick="appendValue('⌫')">⌫</button>

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('%')">%</button>

            <button class="number" onclick="appendValue('0')">0</button>
            <button class="number" onclick="appendValue('.')">.</button>
            <button class="equal" onclick="appendValue('=')">=</button>
            </div>
        </div>

        <script>

            let display = document.getElementById('display');

            function appendValue(data) {

                let operators = ['+', '-', '*', '/', '%'];

                if (data == 'c') 
                {
                    display.value = "";
                }
                else if (data == '⌫') 
                {
                    display.value = display.value.slice(0, -1);
                }
                else if (data == '=') 
                {

                    if (display.value != "") {
                        display.value = eval(display.value);
                    }
                }
                else if (data == '.') 
                {
                    let parts = display.value.split(/[\+\-\*\/%]/);
                    let lastNumber = parts[parts.length - 1];

                    if (!lastNumber.includes('.')) {
                        display.value += data;
                    }
                }
                 else if (operators.includes(data)) {

                    if (display.value == "") {
                        return;
                    }

                    let lastChar = display.value.at(-1);

                    if (!operators.includes(lastChar)) {
                        display.value += data;
                    }
                }
                else {
                    display.value += data;
                }
            }
        </script>
    </body>
</html>
