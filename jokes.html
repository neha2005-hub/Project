<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Random Joke Generator</title>

        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:Arial, Helvetica, sans-serif;
            }

            body{
                display:flex;
                justify-content:center;
                align-items:center;
                min-height:100vh;
                background:linear-gradient(135deg,#667eea,#764ba2);
                padding:20px;
            }

            .container{
                width:100%;
                max-width:650px;
                background:#fff;
                padding:30px;
                border-radius:20px;
                text-align:center;
                box-shadow:0 10px 25px rgba(0,0,0,0.2);
            }

            h1{
                color:#333;
                margin-bottom:25px;
            }

            .box{
                background:#dfdddd;
                border-left:6px solid #667eea;
                border-right:6px solid #667eea;
                border-radius:12px;
                padding:15px;
                margin:15px 0;
                text-align:left;
                transition:0.3s;
            }

            .box:hover{
                transform:translateY(-3px);
                box-shadow:0 5px 15px rgba(0,0,0,0.1);
            }

            #setup, #punchline{
                font-size:20px;
                line-height:1.6;
                color:#333;
                min-height:60px;
                word-wrap:break-word;
            }

            button{
                margin-top:20px;
                padding:12px 28px;
                border:none;
                border-radius:8px;
                background:#667eea;
                color:#fff;
                font-size:18px;
                cursor:pointer;
                transition:0.3s;
            }

            button:hover{
                background:#4b5fd6;
                transform:scale(1.05);
            }

            .loading{
                color:gray;
                font-style:italic;
            }

            @media(max-width:600px){

                .container{
                    padding:20px;
                }

                h1{
                    font-size:28px;
                }

                #setup, #punchline{
                    font-size:18px;
                }

                button{
                    width:100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Random Joke Generator</h1>

            <div class="box">
                <div id="setup"></div>
            </div>

            <div class="box">
                <div id="punchline"></div>
            </div>

            <button onclick="getJoke()">Get Joke</button>
        </div>

        <script>
            async function getJoke(){

                const setup = document.getElementById("setup");
                const punchline = document.getElementById("punchline");
                
                try{
                    const response = await fetch("https://official-joke-api.appspot.com/random_joke");
                    const data = await response.json();

                    setup.innerHTML = data.setup;
                    punchline.innerHTML = data.punchline;
                }
                catch(error){
                    setup.innerHTML = "Failed to load joke.";
                    punchline.innerHTML = "Please try again.";

                    console.log(error);
                }
            }
            getJoke();
        </script>
    </body>
</html>
